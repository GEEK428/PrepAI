version: '3.9'

services:
  redis:
    image: redis:7-alpine
    container_name: intelliprep-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: intelliprep-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - FRONTEND_URL=http://localhost:5173
      - REDIS_URL=redis://redis:6379
    env_file:
      - ./Backend/.env
    volumes:
      - ./Backend:/app
      - /app/node_modules
    depends_on:
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:3000}
        - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
    container_name: intelliprep-frontend
    ports:
      - "5173:80"
    env_file:
      - ./Frontend/.env
    volumes:
      - ./Frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
